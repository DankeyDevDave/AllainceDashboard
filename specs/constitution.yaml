# AquaTemp Project Constitution
# Generated by spec-init on 2025-10-05
# Spec-Kit Version: 2.0.0

name: AquaTemp Heat Pump Integration
version: 3.1.0
created: 2025-10-05
spec_kit_version: 2.0.0

# Project Standards
standards:
  quick_launch:
    location: ./quick_launch.sh
    auto_update: true
    version_tracking: true
    primary_entry_point: true

  naming_conventions:
    features: "NNN-feature-name"        # 001-power-monitoring, 002-dashboard
    branches: "feature/NNN-name"        # feature/001-power-monitoring
    components: snake_case               # aqua_temp_api, sensor_manager
    dashboard_components: PascalCase     # MetricCard, DashboardLayout
    services: kebab-case                # auth-service, data-handler
    files:
      python: snake_case                # aqua_temp_api.py
      typescript: kebab-case            # metric-card.tsx

  directory_structure:
    enforce_standards: true
    integration_directory: custom_components/aqua_temp
    dashboard_directory: pool-dashboard
    test_directory: tests
    spec_directory: specs
    documentation: docs

  git_workflow:
    main_branch: main
    feature_branches: true
    commit_style: conventional          # feat:, fix:, docs:, test:, refactor:
    auto_changelog: true

# Technology Stack
stack:
  languages:
    - Python 3.9+
    - TypeScript 5.0+

  frameworks:
    backend: Home Assistant Integration
    frontend: Next.js 15.5
    ui_library: React 19
    css: Tailwind CSS 4

  services:
    database: InfluxDB 2.x
    visualization: Grafana
    api: Aqua Temp Cloud API

  deployment:
    platform: proxmox
    containerized: false  # Can be dockerized
    home_assistant:
      type: custom_component
      domain: aqua_temp
      iot_class: cloud_polling
    dashboard:
      type: node_application
      port: 3000
      build_command: npm run build
      start_command: npm start

# Integration Configuration
integration:
  domain: aqua_temp
  platforms:
    - sensor
    - climate
    - switch
    - water_heater

  sensors:
    temperature:
      - water_in_temp
      - water_out_temp
      - air_temp
      - target_temp
    power:
      - consumption_watts
      - total_energy_kwh
    status:
      - mode
      - error_code
      - is_heating

  update_interval: 60  # seconds

# Dashboard Configuration
dashboard:
  metrics:
    realtime:
      - current_temperature
      - target_temperature
      - power_consumption
      - heating_status
    historical:
      - temperature_trend
      - power_usage_daily
      - efficiency_metrics
      - runtime_hours

  data_retention:
    raw_data: 7d
    hourly_aggregates: 30d
    daily_aggregates: 365d

# Development Principles
principles:
  - Test-Driven Development (TDD)
  - Specification-First Design
  - Continuous Integration
  - Documentation as Code
  - Security by Design
  - Energy Efficiency Monitoring
  - User-Centric Dashboard Design

# Quality Standards
quality:
  testing:
    minimum_coverage: 80%
    types:
      - unit
      - integration
      - end_to_end

  code_quality:
    python:
      linter: flake8
      formatter: black
      type_checking: mypy
    typescript:
      linter: eslint
      formatter: prettier
      strict_mode: true

  documentation:
    required_for:
      - public_apis
      - configuration_changes
      - new_features
      - breaking_changes

# Automation Rules
automation:
  on_commit:
    - run_tests
    - check_linting
    - update_changelog

  on_feature_complete:
    - update_quick_launch
    - generate_documentation
    - create_release_notes

  on_release:
    - build_integration_package
    - tag_version
    - update_manifest
    - deploy_dashboard

# Monitoring & Observability
monitoring:
  metrics_collection:
    source: home_assistant
    destination: influxdb
    interval: 60s

  dashboards:
    grafana:
      - pool_temperature_overview
      - power_consumption_analysis
      - system_health_monitoring

    nextjs:
      - realtime_metrics
      - historical_trends
      - system_status

# Security
security:
  api_credentials:
    storage: environment_variables
    encryption: required
    rotation: recommended_90_days

  dashboard:
    authentication: optional
    https: recommended
    cors: configured

  home_assistant:
    config_flow: true
    input_validation: strict
    error_handling: comprehensive

# Project Metadata
metadata:
  repository: https://github.com/radical-squared/aquatemp
  documentation: https://github.com/radical-squared/aquatemp/wiki
  issue_tracker: https://github.com/radical-squared/aquatemp/issues
  maintainers:
    - "@radical-squared"
    - "@elad-bar"